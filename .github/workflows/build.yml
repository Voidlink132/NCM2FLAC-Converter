name: Build NCM2FLAC APK

# 触发条件：当代码推送到 main 分支时自动构建
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码到构建环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装并配置 JDK 17（适配 Android Gradle 插件）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 授予 Gradle Wrapper 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行 Gradle 构建，生成 Debug 版 APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. 上传构建好的 APK 作为构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NCM2FLAC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

