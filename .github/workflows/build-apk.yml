name: 手动打包NCM2FLAC APK
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置JDK 17（匹配Gradle 8.6要求）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置Gradle执行权限
        run: chmod +x ./gradlew

      - name: 自动接受Android SDK许可协议
        run: sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Gradle构建APK（同时输出Debug和Release包）
        run: ./gradlew assembleDebug assembleRelease

      - name: 上传Debug安装包
        uses: actions/upload-artifact@v4
        with:
          name: NCM2FLAC-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 上传Release安装包
        uses: actions/upload-artifact@v4
        with:
          name: NCM2FLAC-Release-APK
          path: app/build/outputs/apk/release/*.apk
