name: Manual-Packing

# 【核心修改】仅保留手动触发，彻底关闭自动触发
on:
  workflow_dispatch: # 这是GitHub官方手动触发的专属配置，只有你手动点击才会执行
    # 可选：手动触发时支持自定义参数（比如选择编译Release/Debug）
    inputs:
      buildType:
        description: '编译类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 设置Android环境
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true

      - name: 授予gradlew执行权限
        run: chmod +x gradlew

      - name: 清理旧编译缓存
        run: ./gradlew clean

      # 根据手动选择的编译类型执行
      - name: 编译Release APK
        if: ${{ inputs.buildType == 'all' || inputs.buildType == 'release' }}
        run: ./gradlew assembleRelease

      - name: 编译Debug APK
        if: ${{ inputs.buildType == 'all' || inputs.buildType == 'debug' }}
        run: ./gradlew assembleDebug

      - name: 上传Release APK到制品
        if: ${{ inputs.buildType == 'all' || inputs.buildType == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: Ncm2Flac-Release-APK
          path: app/build/outputs/apk/release/*.apk

      - name: 上传Debug APK到制品
        if: ${{ inputs.buildType == 'all' || inputs.buildType == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: Ncm2Flac-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
