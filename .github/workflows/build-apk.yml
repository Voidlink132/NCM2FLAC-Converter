name: 自动打包NCM2flac APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read # 显式声明权限，解决token读取release权限问题
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装系统基础依赖（仅官方源稳定包，无任何Android依赖）
        run: |
          sudo apt-get update
          # 仅安装Ubuntu官方源100%稳定存在的基础包，无任何Android相关依赖
          sudo apt-get install -y openjdk-17-jdk curl unzip
          echo "✅ 系统基础依赖安装完成"

      - name: 部署Google官方Android构建工具（彻底摆脱apt依赖）
        run: |
          # 创建工具存放目录
          sudo mkdir -p /usr/local/android-tools /usr/local/android-sdk/platforms
          
          # 1. 下载并部署aapt2、apksigner（官方静态二进制，无依赖）
          curl -fSL -o build-tools.zip https://dl.google.com/android/repository/build-tools_r34-linux.zip
          sudo unzip -j build-tools.zip android-14/aapt2 android-14/apksigner -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/aapt2 /usr/local/bin/apksigner
          
          # 2. 下载并部署Android 34平台jar包（aapt2链接必需）
          curl -fSL -o platform-34.zip https://dl.google.com/android/repository/platform-34_r03.zip
          sudo unzip -j platform-34.zip android.jar -d /usr/local/android-sdk/platforms/android-34/
          
          # 验证所有工具部署成功
          aapt2 version
          apksigner version
          if [ -f /usr/local/android-sdk/platforms/android-34/android.jar ]; then
            echo "✅ Android构建工具与SDK部署完成，无apt依赖"
          else
            echo "❌ Android SDK部署失败"
            exit 1
          fi

      - name: 创建工作目录与assets目录
        run: |
          mkdir -p build/assets build/lib/arm64-v8a build/res/values build/META-INF
          
      - name: 获取ncmc最新版二进制（双层兜底，API失败不中断构建）
        id: get-ncmc
        run: |
          # 备用稳定版链接，API完全失败时兜底
          FALLBACK_URL="https://github.com/taurusxin/ncmc/releases/download/v1.2.1/ncmc-linux-arm64.zip"
          FALLBACK_VERSION="1.2.1"
          
          # 第一层：调用GitHub API，加--fail参数，失败直接走兜底
          if RELEASE_DATA=$(gh api --fail repos/taurusxin/ncmc/releases/latest 2>/dev/null); then
            # jq加?安全访问符，字段缺失不报错，仅返回空值
            DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[]? | select(.name | contains("linux-arm64")) | .browser_download_url')
            VERSION=$(echo "$RELEASE_DATA" | jq -r '.tag_name? | ltrimstr("v")')
            
            # 第二层：API成功但匹配不到链接，走备用稳定版
            if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
              echo "⚠️ 未匹配到arm64下载链接，使用备用稳定版v$FALLBACK_VERSION"
              DOWNLOAD_URL="$FALLBACK_URL"
              VERSION="$FALLBACK_VERSION"
            fi
          else
            # API调用完全失败（限流/权限/网络问题），直接走备用稳定版
            echo "⚠️ GitHub API调用失败，使用备用稳定版v$FALLBACK_VERSION"
            DOWNLOAD_URL="$FALLBACK_URL"
            VERSION="$FALLBACK_VERSION"
          fi
          
          # 输出变量给后续步骤使用
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 最终使用ncmc版本: v$VERSION"

      - name: 下载并解压ncmc二进制（下载校验，解决0b文件问题）
        run: |
          # 用curl零兼容问题下载，失败直接退出
          curl -fSL -o build/ncmc-linux-arm64.zip ${{ steps.get-ncmc.outputs.download_url }}
          
          # 校验文件是否下载成功
          if [ ! -s build/ncmc-linux-arm64.zip ]; then
            echo "❌ 下载失败，文件为空"
            exit 1
          fi
          
          # 解压并放置到正确位置
          unzip build/ncmc-linux-arm64.zip -d build/
          mv build/ncmc build/assets/ncmc
          chmod +x build/assets/ncmc
          echo "✅ ncmc二进制准备完成"

      - name: 生成APK基础配置文件（固定包名com.ncm2flac）
        run: |
          # 生成AndroidManifest.xml
          cat > build/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ncm2flac"
              android:versionCode="1"
              android:versionName="${{ steps.get-ncmc.outputs.version }}">
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34"/>
              <application android:label="NCM2flac" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # 生成基础资源文件
          cat > build/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">NCM2flac</string>
          </resources>
          EOF
          
          echo "✅ APK配置文件生成完成"

      - name: 编译资源与打包APK
        run: |
          # 编译资源
          aapt2 compile -o build/res.zip build/res/values/strings.xml
          # 链接APK，使用我们部署的官方android.jar，无apt依赖
          aapt2 link build/res.zip --manifest build/AndroidManifest.xml -o build/unaligned.apk -I /usr/local/android-sdk/platforms/android-34/android.jar
          
          # 将assets打包进APK
          cd build
          zip -r unaligned.apk assets/
          cd ..
          
          # 生成调试签名密钥
          keytool -genkey -v -keystore build/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          
          # 签名APK，使用我们部署的官方apksigner
          apksigner sign --ks build/debug.keystore --ks-pass pass:android --key-pass pass:android --out build/NCM2flac.apk build/unaligned.apk
          
          echo "✅ APK打包签名完成"

      - name: 上传打包好的APK
        uses: actions/upload-artifact@v4
        with:
          name: NCM2flac-v${{ steps.get-ncmc.outputs.version }}-APK
          path: build/NCM2flac.apk
